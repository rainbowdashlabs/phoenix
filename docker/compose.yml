services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8888"
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres:/var/lib/postgresql/18/docker
    ports:
      - "5432:5432"